---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: silvernyx
description: This is my personal OS image base on Ublue Fedora Silverblue

base-image: ghcr.io/ublue-os/silverblue-main
image-version: 44

modules:
  - type: files
    files:
      - source: system
        destination: /
  
  - type: dnf
    repos:
      copr:
        - atim/starship
        - lionheartp/Hyprland
        - yalter/niri
        - scottames/ghostty
        - peterwu/iosevka
        - arciel/packages
      files:
        - https://github.com/terrapkg/subatomic-repos/raw/main/terra.repo
    remove:
      packages:
        - firefox
        - firefox-langpacks
        - gnome-software
        - gnome-initial-setup
        - gnome-tour
        - gnome-classic-session
        - gnome-user-docs
        - gnome-remote-desktop
        - transmission-daemon
    install:
      packages:
        - bat
        - chezmoi
        - chromium
        - fastfetch
        - fuse-libs
        - git
        - libvirt
        - libvirt-client
        - libvirt-daemon
        - libvirt-daemon-driver-qemu
        - libvirt-daemon-config-network
        - lsd
        - kitty
        - mangohud
        - neovim
        - qemu-kvm
        - sshfs
        - starship
        - vim
        - virt-install
        - virt-manager
        - zsh
        - noctalia-git
        - niri
        - ghostty
        - iosevka-fonts
        - papirus-icon-theme
        - phinger-cursors
  
  - type: default-flatpaks
    configurations:
    - scope: user
      repo:
        title: Flathub (user)
    - scope: system
      notify: false 
      repo:
        title: Flathub (system)
      install: 
          - com.github.johnfactotum.Foliate
          - com.github.tchx84.Flatseal
          - com.mattjakeman.ExtensionManager
          - com.rtosta.zapzap
          - com.vscodium.codium
          - com.saivert.pwvucontrol
          - dev.vencord.Vesktop
          - io.github.celluloid_player.Celluloid
          - io.github.kolunmi.Bazaar
          - io.missioncenter.MissionCenter
          - org.gnome.baobab
          - org.gnome.Calculator
          - org.gnome.Calendar
          - org.gnome.Characters
          - org.gnome.clocks
          - org.gnome.Contacts
          - org.gnome.Firmware
          - org.gnome.font-viewer
          - org.gnome.Logs
          - org.gnome.Loupe
          - org.gnome.NautilusPreviewer
          - org.gnome.Papers
          - org.gnome.TextEditor
          - org.gnome.Weather
          - org.gnucash.GnuCash
          - org.libreoffice.LibreOffice
          - org.mozilla.firefox
          - org.mozilla.thunderbird
          - org.remmina.Remmina

  - type: gnome-extensions
    install:
      - AppIndicator and KStatusNotifierItem Support
      - Just Perfection
      - User Themes

  - type: initramfs
  - type: signing
